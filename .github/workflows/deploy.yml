name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when frontend files change
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install ──────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Firebase
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY:            ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          # Instagram oEmbed
          VITE_OEMBED_TOKEN:                  ${{ secrets.VITE_OEMBED_TOKEN }}
          # OCR Server (Railway)
          VITE_OCR_SERVER_URL:                ${{ secrets.VITE_OCR_SERVER_URL }}
          # AdSense
          VITE_ADSENSE_CLIENT:                ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT_TIMELINE:         ${{ secrets.VITE_ADSENSE_SLOT_TIMELINE }}
          VITE_ADSENSE_SLOT_DETAIL:           ${{ secrets.VITE_ADSENSE_SLOT_DETAIL }}
          # Kakao Adfit
          VITE_ADFIT_UNIT_ID:                 ${{ secrets.VITE_ADFIT_UNIT_ID }}

      # ── Deploy to Vercel ─────────────────────────────────────────────────────
      - name: Deploy to Vercel (production)
        run: |
          npx vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}